<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2b14"/>
      <stop offset="100%" stop-color="#2d7a3e"/>
    </linearGradient>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4caf6f"/>
      <stop offset="100%" stop-color="#8bc34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Samara Oblast map shape (stylized, accurate silhouette) -->
  <!-- Самарская область: характерная форма — вытянутая слева, выступ Жигулей сверху, сужение внизу -->
  <g transform="translate(512, 440) scale(1)" filter="url(#shadow)">
    <path d="
      M -240 -180
      L -260 -140
      L -270 -80
      L -255 -30
      L -240 20
      L -220 60
      L -200 40
      L -195 10
      L -180 -10
      L -175 30
      L -155 70
      L -130 100
      L -95 120
      L -70 130
      L -60 160
      L -30 175
      L 0 180
      L 30 175
      L 60 160
      L 90 140
      L 120 120
      L 150 90
      L 180 60
      L 200 20
      L 220 -20
      L 230 -70
      L 215 -120
      L 200 -160
      L 170 -190
      L 130 -200
      L 100 -185
      L 70 -195
      L 40 -200
      L 10 -195
      L -20 -190
      L -50 -200
      L -80 -205
      L -110 -200
      L -150 -210
      L -185 -205
      L -220 -195
      Z
    " fill="url(#mapGrad)" stroke="rgba(255,255,255,0.5)" stroke-width="4" filter="url(#glow)"/>

    <!-- Жигулёвские горы — характерный выступ на севере -->
    <path d="
      M -60 -200
      L -80 -230
      L -60 -250
      L -30 -240
      L -10 -220
      L 10 -200
    " fill="url(#mapGrad)" stroke="rgba(255,255,255,0.5)" stroke-width="4"/>

    <!-- Волга — белая линия через карту -->
    <path d="M -180 -100 Q -100 -60 -60 0 Q -20 60 20 110 Q 50 145 70 165"
          fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="6" stroke-linecap="round"/>

    <!-- Лист в центре карты -->
    <g transform="translate(60, -20)" filter="url(#glow)">
      <ellipse cx="0" cy="0" rx="45" ry="60" fill="white" opacity="0.95" transform="rotate(-20)"/>
      <ellipse cx="0" cy="0" rx="25" ry="45" fill="url(#mapGrad)" transform="rotate(-20)"/>
      <line x1="0" y1="-55" x2="0" y2="55" stroke="white" stroke-width="2.5" opacity="0.8" transform="rotate(-20)"/>
    </g>

    <!-- Точка — Самара -->
    <circle cx="80" cy="20" r="10" fill="white" opacity="0.9"/>
    <circle cx="80" cy="20" r="5" fill="#f6c94e"/>
  </g>

  <!-- Название приложения -->
  <text
    x="512"
    y="760"
    text-anchor="middle"
    font-family="'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif"
    font-size="88"
    font-weight="900"
    letter-spacing="2"
    fill="white"
  >ЭкоВклад</text>

  <!-- Подчёркивание под текстом -->
  <rect x="270" y="778" width="484" height="5" rx="3" fill="url(#mapGrad)" opacity="0.8"/>

  <!-- Декоративные точки-звёзды -->
  <circle cx="200" cy="880" r="5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="824" cy="880" r="5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="160" cy="840" r="3" fill="rgba(76,175,111,0.4)"/>
  <circle cx="864" cy="840" r="3" fill="rgba(76,175,111,0.4)"/>
</svg>
